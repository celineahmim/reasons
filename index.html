<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10 reasons I like you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pink: #e879a0;
    --pink-light: #fdf0f6;
    --pink-border: #f0c8d8;
    --pink-dark: #993556;
    --blue: #7ec8e3;
    --blue-light: #eaf4fb;
    --blue-dark: #0c447c;
    --text: #2d2d2d;
    --muted: #aaa;
    --wrong-bg: #fff8f0;
    --wrong-border: #f5c4b3;
    --wrong-text: #993c1d;
  }
  html, body { min-height: 100vh; background: #ffffff; font-family: 'DM Sans', sans-serif; color: var(--text); }
  body { display: flex; align-items: flex-start; justify-content: center; padding: 3rem 1rem 4rem; }
  .container { width: 100%; max-width: 540px; }

  .header { text-align: center; margin-bottom: 2.5rem; }
  .heart-icon { width: 48px; height: 48px; background: var(--pink-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; border: 0.5px solid var(--pink-border); }
  .heart-icon svg { width: 22px; height: 22px; stroke: var(--pink); fill: none; stroke-width: 1.8; }
  .header h1 { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; color: var(--text); margin-bottom: 6px; }
  .header p { font-size: 13px; color: var(--muted); font-weight: 300; }

  .progress-wrap { background: var(--pink-light); border-radius: 99px; height: 4px; margin-bottom: 1rem; overflow: hidden; }
  .progress-fill { height: 4px; border-radius: 99px; background: var(--pink); transition: width 0.5s cubic-bezier(0.4,0,0.2,1); width: 0%; }

  .dots { display: flex; justify-content: center; gap: 5px; margin-bottom: 2rem; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--pink-border); transition: background 0.3s, transform 0.3s; }
  .dot.done { background: var(--blue); }
  .dot.active { background: var(--pink); transform: scale(1.3); }

  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .card { background: #fff; border: 0.5px solid var(--pink-border); border-radius: 20px; padding: 1.75rem; animation: slideUp 0.3s ease; }
  .q-number { font-size: 10px; font-weight: 500; color: var(--pink); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
  .q-text { font-family: 'DM Serif Display', serif; font-size: 18px; font-weight: 400; color: var(--text); line-height: 1.4; margin-bottom: 1.5rem; }

  .choices { display: flex; flex-direction: column; gap: 8px; }
  .choice { background: var(--pink-light); border: 0.5px solid var(--pink-border); border-radius: 12px; padding: 12px 18px; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 400; color: var(--text); cursor: pointer; text-align: left; transition: background 0.15s, border-color 0.15s, transform 0.1s; }
  .choice:hover:not(:disabled) { background: #fce8f2; border-color: var(--pink); transform: translateX(3px); }
  .choice:disabled { cursor: default; transform: none; }
  .choice.correct { background: var(--blue-light); border-color: var(--blue); color: var(--blue-dark); }
  .choice.wrong { background: #fff0f3; border-color: #f09595; color: #a32d2d; text-decoration: line-through; opacity: 0.7; }

  .wrong-note { background: var(--wrong-bg); border: 0.5px solid var(--wrong-border); border-radius: 12px; padding: 10px 14px; margin-top: 1rem; display: none; font-size: 13px; color: var(--wrong-text); }

  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
  .counter { font-size: 12px; color: var(--muted); font-weight: 300; }
  .nav-btn { background: var(--pink); color: #fff; border: none; border-radius: 12px; padding: 10px 24px; font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; display: none; transition: background 0.15s, transform 0.1s; }
  .nav-btn:hover { background: #d4537e; transform: scale(1.02); }
  .nav-btn:active { transform: scale(0.98); }

  .unlock-screen { display: none; text-align: center; animation: slideUp 0.4s ease; }
  .unlock-heart { width: 80px; height: 80px; background: var(--pink-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; border: 0.5px solid var(--pink-border); }
  .unlock-heart svg { width: 34px; height: 34px; stroke: var(--pink); fill: none; stroke-width: 1.6; }
  .unlock-label { font-size: 10px; font-weight: 500; color: var(--pink); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 1.25rem; }
  .unlock-box { background: var(--pink-light); border: 0.5px solid var(--pink-border); border-radius: 20px; padding: 2.5rem 2rem; margin-bottom: 1.75rem; }
  .unlock-reason { font-family: 'DM Serif Display', serif; font-size: 24px; font-weight: 400; color: var(--pink-dark); line-height: 1.55; font-style: italic; }
  .continue-btn { background: var(--pink); color: #fff; border: none; border-radius: 12px; padding: 11px 28px; font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.15s, transform 0.1s; }
  .continue-btn:hover { background: #d4537e; transform: scale(1.02); }
  .continue-btn:active { transform: scale(0.98); }

  .final { text-align: center; padding: 3rem 1rem; display: none; animation: slideUp 0.4s ease; }
  .final-heart { width: 60px; height: 60px; background: var(--pink-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; border: 0.5px solid var(--pink-border); }
  .final-heart svg { width: 26px; height: 26px; stroke: var(--pink); fill: none; stroke-width: 1.8; }
  .final h2 { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; color: var(--text); margin-bottom: 10px; }
  .final .subtitle { font-size: 14px; color: var(--muted); line-height: 1.7; font-weight: 300; max-width: 340px; margin: 0 auto; }
  .score-pill { display: inline-block; background: var(--pink-light); border: 0.5px solid var(--pink-border); border-radius: 99px; padding: 5px 18px; font-size: 13px; color: var(--pink-dark); margin-top: 1.25rem; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="heart-icon">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </div>
    <h1>10 reasons I like you</h1>
    <p>Answer each question to unlock a reason.</p>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="prog"></div></div>
  <div class="dots" id="dots"></div>

  <div id="quiz-area"></div>

  <div class="unlock-screen" id="unlock-screen">
    <div class="unlock-heart">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </div>
    <div class="unlock-label">Reason unlocked</div>
    <div class="unlock-box">
      <div class="unlock-reason" id="unlock-reason-text"></div>
    </div>
    <button class="continue-btn" id="continue-btn">Continue →</button>
  </div>

  <div class="final" id="final">
    <div class="final-heart">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </div>
    <h2 id="final-title"></h2>
    <p class="subtitle" id="final-sub"></p>
    <div class="score-pill" id="score-pill"></div>
  </div>
</div>

<script>
const questions = [
  { q: "What is my dog's name?", choices: ["Luna", "Candy", "Nala"], answer: "Candy", reason: "I like your voice. I could listen to you talk for hours and never get tired of it." },
  { q: "What year did we meet?", choices: ["2018", "2020", "2019"], answer: "2019", reason: "You show up, consistently. I don't take it for granted." },
  { q: "What is the only dish I know how to cook?", choices: ["Pasta", "Omelette", "Fries"], answer: "Fries", reason: "You are stubborn. It gives you this little edge I find oddly charming." },
  { q: "On which social network did we meet?", choices: ["Instagram", "Facebook", "Twitter"], answer: "Facebook", reason: "You are completely unhinged." },
  { q: "What is my favorite AI?", choices: ["ChatGPT", "Gemini", "Claude"], answer: "Claude", reason: "You are so funny. Sometimes I laugh just because you're laughing." },
  { q: "What is our passion in common?", choices: ["Cooking", "Traveling", "Photography"], answer: "Traveling", reason: "Your joy for life is contagious." },
  { q: "How many countries have we both visited?", choices: ["3", "7", "5"], answer: "5", reason: "You respect me. You never make me feel small (even if no one can manage to do it HAHAHA), and that means more than you know." },
  { q: "What is the last AI system I worked on?", choices: ["Google Ads", "Meta Ads", "TikTok Ads"], answer: "Google Ads", reason: "I never get bored with you." },
  { q: "In which month was I born?", choices: ["March", "June", "September"], answer: "June", reason: "You are full of surprises. I never want that to stop." },
  { q: "What is my exact birthday?", choices: ["June 7, 2000", "June 17, 2000", "June 27, 2000"], answer: "June 17, 2000", reason: "Your intelligence is sexy." }
];

const finalMessages = {
  top:  { sub: "Maybe I should introduce you to my parents." },
  high: { sub: "Not bad." },
  mid:  { sub: "Ouch... should I go look elsewhere?" },
  low:  { sub: "I don't like you anymore." }
};

let current = 0, unlocked = 0, answered = false;
const quizArea = document.getElementById('quiz-area');
const prog = document.getElementById('prog');
const dotsEl = document.getElementById('dots');
const finalEl = document.getElementById('final');
const unlockScreen = document.getElementById('unlock-screen');

function buildDots() {
  dotsEl.innerHTML = '';
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < current ? ' done' : i === current ? ' active' : '');
    dotsEl.appendChild(d);
  });
}

function showUnlockScreen(reason) {
  quizArea.style.display = 'none';
  unlockScreen.style.display = 'block';
  document.getElementById('unlock-reason-text').textContent = reason;
  document.getElementById('continue-btn').onclick = () => {
    unlockScreen.style.display = 'none';
    current++;
    if (current >= questions.length) {
      showFinal();
    } else {
      quizArea.style.display = 'block';
      render();
    }
  };
}

function showFinal() {
  finalEl.style.display = 'block';
  prog.style.width = '100%';
  buildDots();
  document.getElementById('score-pill').textContent = unlocked + ' / 10 unlocked';
  let msg;
  if (unlocked >= 9) msg = finalMessages.top;
  else if (unlocked >= 7) msg = finalMessages.high;
  else if (unlocked >= 4) msg = finalMessages.mid;
  else msg = finalMessages.low;
  document.getElementById('final-title').textContent = unlocked === 10 ? "You unlocked all 10 reasons." : `You unlocked ${unlocked} / 10 reasons.`;
  document.getElementById('final-sub').textContent = msg.sub;
}

function render() {
  answered = false;
  prog.style.width = (current / questions.length * 100) + '%';
  buildDots();
  const q = questions[current];
  quizArea.innerHTML = '';

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="q-number">Question ${current + 1} of ${questions.length}</div>
    <div class="q-text">${q.q}</div>
    <div class="choices" id="choices"></div>
    <div class="wrong-note" id="wrong-note"></div>
  `;
  quizArea.appendChild(card);

  const nav = document.createElement('div');
  nav.className = 'nav-row';
  nav.innerHTML = `<div class="counter" id="counter">${unlocked} / 10 unlocked</div><button class="nav-btn" id="next-btn">Next →</button>`;
  quizArea.appendChild(nav);

  q.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = c;
    btn.onclick = () => handleAnswer(c, q);
    document.getElementById('choices').appendChild(btn);
  });

  document.getElementById('next-btn').onclick = () => {
    current++;
    if (current >= questions.length) showFinal();
    else render();
  };
}

function handleAnswer(selected, q) {
  if (answered) return;
  answered = true;
  const isCorrect = selected === q.answer;
  document.querySelectorAll('.choice').forEach(b => {
    b.disabled = true;
    if (isCorrect && b.textContent === q.answer) b.classList.add('correct');
    else if (!isCorrect && b.textContent === selected) b.classList.add('wrong');
  });
  if (isCorrect) {
    unlocked++;
    document.getElementById('counter').textContent = unlocked + ' / 10 unlocked';
    setTimeout(() => showUnlockScreen(q.reason), 350);
  } else {
    document.getElementById('wrong-note').textContent = "Ah well, guess you'll never know HAHAHA";
    document.getElementById('wrong-note').style.display = 'block';
    document.getElementById('next-btn').style.display = 'block';
    document.getElementById('next-btn').textContent = current === questions.length - 1 ? 'See results' : 'Next →';
  }
}

render();
</script>
</body>
</html>
